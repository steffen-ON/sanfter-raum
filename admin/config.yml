backend:
  name: git-gateway
  branch: main

media_folder: "bilder"

collections:
  - name: "aktuelles"
    label: "Aktuelles"
    folder: "_aktuelles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime" }
      - { label: "Kategorie", name: "tag", widget: "select", options: ["Grundlagen", "Praxis", "Community", "Ankündigung"] }
      - { label: "Kurzbeschreibung", name: "excerpt", widget: "string" }
      - { label: "Emoji", name: "emoji", widget: "string", default: "🌿", hint: "Ein Emoji als Titelbild" }
      - { label: "Inhalt", name: "body", widget: "markdown" }
